<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>疑義處方知識庫搜尋系統 v1.0</title>
<style>
:root {
  --bg:#f7f8fb; --card:#fff; --text:#162033; --muted:#667085; --line:#e4e7ec;
  --primary:#2563eb; --primary2:#1d4ed8; --chip:#eef4ff; --danger:#fff1f3; --ok:#ecfdf3;
  --before:#fff7ed; --after:#ecfdf3; --beforeRow:#fff1f2; --afterRow:#dcfce7;
  --shadow:0 10px 28px rgba(16,24,40,.08);
}
*{box-sizing:border-box}
body{margin:0;font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;background:var(--bg);color:var(--text)}
body.modal-open{overflow:hidden}
header{background:linear-gradient(135deg,#1d4ed8,#0f766e);color:#fff;padding:28px 20px}
.wrap{max-width:1180px;margin:0 auto}
h1{margin:0 0 8px;font-size:28px}
.sub{opacity:.9;font-size:14px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin:18px auto;box-shadow:var(--shadow)}
.searchbar{display:grid;grid-template-columns:1fr 160px 160px 160px;gap:10px}
input,select,button{font-size:15px;border:1px solid var(--line);border-radius:12px;padding:11px 12px;background:#fff}
input:focus,select:focus{outline:2px solid #bfdbfe;border-color:#93c5fd}
button{background:var(--primary);color:#fff;border:none;cursor:pointer;font-weight:700}
button:hover{background:var(--primary2)}
.tools{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;align-items:center}
.toolbtn{background:#f2f4f7;color:#344054;border:1px solid var(--line);font-weight:600}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.stat{background:#f8fafc;border:1px solid var(--line);border-radius:14px;padding:10px 12px;min-width:120px}
.stat b{display:block;font-size:22px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin:14px 0 26px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 6px 16px rgba(16,24,40,.04);min-height:236px;display:flex;flex-direction:column}
.card:hover{box-shadow:var(--shadow);transform:translateY(-1px);transition:.15s ease}
.card h3{margin:8px 0 6px;font-size:18px}
.meta{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:12px;border-radius:999px;padding:5px 9px;background:var(--chip);color:#1e40af;font-weight:700}
.badge.err{background:var(--danger);color:#be123c}
.badge.q{background:var(--ok);color:#047857}
.row{margin:7px 0;color:#344054;font-size:14px;line-height:1.55}
.label{color:#667085;font-size:13px;margin-right:4px}
.summary{line-height:1.65;margin:10px 0;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-actions{margin-top:auto;padding-top:10px}
.openbtn{width:100%;padding:10px 12px}
mark{background:#fef08a;padding:0 2px;border-radius:3px}
.empty{padding:40px;text-align:center;color:var(--muted)}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.58);display:none;align-items:center;justify-content:center;padding:18px;z-index:1000}
.modal-backdrop.show{display:flex}
.modal{width:min(1060px,96vw);max-height:92vh;background:#fff;border-radius:22px;box-shadow:0 24px 80px rgba(0,0,0,.28);display:flex;flex-direction:column;overflow:hidden}
.modal-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;gap:12px;justify-content:space-between;align-items:flex-start;background:#fbfdff}
.modal-title h2{margin:8px 0 4px;font-size:24px}
.modal-title .drug{color:#667085;font-weight:500}
.closebtn{background:#f2f4f7;color:#344054;border:1px solid var(--line);border-radius:12px;padding:8px 12px;white-space:nowrap}
.modal-body{padding:20px;overflow:auto}
.section{border:1px solid var(--line);border-radius:16px;margin-bottom:14px;background:#fff;overflow:hidden}
.section-title{font-weight:800;padding:11px 13px;background:#f8fafc;border-bottom:1px solid var(--line)}
.section-body{padding:13px;line-height:1.75}
.prebox{white-space:pre-wrap;background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:13px;line-height:1.65;font-family:inherit;font-size:14px;max-height:none;overflow:auto}
.rx-wrap{display:grid;grid-template-columns:1fr;gap:12px}
.rx-box{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff}
.rx-title{font-weight:800;padding:10px 12px;border-bottom:1px solid var(--line)}
.rx-title.before{background:var(--before);color:#9a3412}
.rx-title.after{background:var(--after);color:#047857}
.rx-note{font-size:13px;color:#667085;margin-bottom:10px;line-height:1.5}
.table-scroll{overflow:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:9px 10px;border-bottom:1px solid #eef2f7;vertical-align:top;text-align:left}
th{background:#f8fafc;color:#475467;white-space:nowrap}
td:nth-child(1){min-width:230px}
tr.changed-before td{background:var(--beforeRow);font-weight:700;color:#9f1239}
tr.changed-after td{background:var(--afterRow);font-weight:700;color:#166534}
.diff{display:grid;grid-template-columns:1fr;gap:8px;margin:0}
.diff-item{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}
.diff-before{padding:9px 11px;background:var(--beforeRow);color:#9f1239;font-weight:700}
.diff-arrow{padding:4px 11px;color:#667085;background:#fff}
.diff-after{padding:9px 11px;background:var(--afterRow);color:#166534;font-weight:700}
.tags{display:flex;gap:7px;flex-wrap:wrap}
.tag{display:inline-block;background:#eef4ff;color:#1e40af;border:1px solid #dbeafe;border-radius:999px;padding:5px 10px;font-weight:700;font-size:13px}
footer{color:#667085;text-align:center;font-size:12px;padding:22px}
@media(max-width:820px){
  .searchbar{grid-template-columns:1fr}
  .modal-backdrop{padding:0}
  .modal{width:100vw;height:100vh;max-height:100vh;border-radius:0}
  .modal-head{padding:14px}
  .modal-title h2{font-size:21px}
  .modal-body{padding:14px}
  table{font-size:13px}
}
</style>

<header>
  <div class="wrap">
    <h1>疑義處方知識庫搜尋系統 v1.0</h1>
    <div class="sub">資料範圍：錯誤醫囑114Q1～115Q1｜可離線使用｜搜尋、篩選、放大閱讀、處方異動比較</div>
  </div>
</header>

<main class="wrap">
  <section class="panel">
    <div class="searchbar">
      <input id="q" placeholder="輸入藥物學名、商品名、關鍵字，例如：Vancomycin、Linezolid、RINA、CIPN、Q6H" autofocus />
      <select id="type"><option value="">全部類型</option></select>
      <select id="year"><option value="">全部年度</option></select>
      <select id="category"><option value="">全部分類</option></select>
    </div>
    <div class="tools">
      <button onclick="resetFilters()" class="toolbtn">清除條件</button>
      <button onclick="downloadJSON()" class="toolbtn">匯出 JSON</button>
      <button onclick="copyCSV()" class="toolbtn">複製 CSV</button>
      <span id="count" style="color:#667085"></span>
    </div>
    <div class="stats" id="stats"></div>
  </section>

  <section id="results" class="grid"></section>
</main>

<div class="modal-backdrop" id="modalBackdrop" onclick="backdropClose(event)">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalHeading">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle"></div>
      <button class="closebtn" onclick="closeModal()">關閉 ✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

    "原始全文": "<疑義處方集錦> \n\n15歲女性，身高147公分，體重46.8公斤。診斷右側下肢蜂窩組織炎，異位性皮膚炎，多部位幼年型類風濕性關節炎，身材短小。醫師開立自費Alendronate/Colecalciferol (FOSAMAX-Plus)？\n\n→醫師回覆用於Legg-Calve-Perthes Disease (LCPD) or Avascular necrosis (AVN)\n\n小兒股骨頭缺血性壞死(LCPD)：好發在2~12歲的兒童，主因未成熟的股骨頭血液供應中斷，造成暫時性骨頭壞死，真正原因不明。病理演變分4 stages。Catterall分期法是常用的X-ray診斷標準方法。預後與發病年齡、病史的長短以及正確治療方法有關。\n\n股骨頭缺血性壞死(AVN)：是指股骨頭細胞失養壞死，因而軟化塌陷，造成整個髖關節破壞的一種疾病。常見原因可分為創傷性及非創傷性；創傷性多由於經歷股骨頸骨折或髖關節脫臼後造成血管破壞而形成。非創傷性常見原因為酗酒、過量使用類固醇、血紅素病變、慢性肝病變、減壓病、高雪氏病、痛風、脂肪或血醣代謝異常、血液凝集疾病如鐮刀型貧血、懷孕、放 射線治療、抽菸、高血脂、骨代謝疾病。\n\n藥物治療：NSAID、口服雙磷酸鹽類藥物如Alendronate，目前最廣泛使用與研究的藥物iloprost為一前列腺素衍生藥物為血管擴張劑，用於治療發病初期(第一期)。\n\n高壓氧：連續使用100天之高壓氧治療，亦可使81%的早期股骨頭壞死回復正常，但由於費用昂貴，健保亦未給付，臨床上甚少採用。\n\n手術治療：疾病早期(第一、二期)的手術治療可用中心減壓術(Core decompression)。一旦股骨頭出現塌陷後只能施以人工關節置換，按其受損情形置換股骨頭或做全髖關節置換。",

    "原始全文": "\n\n72歲男性，身高171公分，體重85.5公斤。診斷右側支氣管或肺惡性腫瘤、藥物導致之多發神經病變。醫師自費開立Duloxetine？\n\n→醫師回覆化療引起周邊神經病變(Chemotherapy – Induced Peripheral Neuropathy, CIPN)\n\n由神經毒性系統治療藥物(Cisplatin、Oxaliplatin、Taxol、Vincristine等) 引起的周圍神經纖維(運動、感覺、自主神經)的損傷。像是病人感到麻刺或麻木的感覺；感覺異常是病人覺得空手觸摸時像戴手套摸東西，或光腳走路時像穿襪子走路或踩在沙地上走等感覺。症狀通常從手指和腳趾開始分佈向近端。常見於化療後，以快速、漸進式或持續性的型態出現。\n\n治療藥物除一般的非類固醇類止痛藥（NSAID）、鴉片類止痛藥外，亦可加上三環抗憂鬱劑（Duloxetine、Imipramine、fluoxetine等）。部份研究顯示Carbamazepine對治療週邊神經病變有緩解效果。\n\n非藥物治療：(1)癌症輔助及另類療法（Complementary and Alternative Medicine, CAM)，可能對某些人有幫助。(2)放鬆技術、深呼吸、冥想、瑜伽、視覺或引導性想像(3)神經回饋-認知療法 (4)按摩、針灸、經皮神經電刺激（TENS）。 (5)請家屬以溫度計測量水溫(勿超過40 ℃)，並教導病人每日以溫水浸泡足 踝以下的部位約30分鐘左右，以促進足部血循。",

    "原始全文": "<疑義處方集錦> \n\n44歲男性，身高180公分，體重75.3公斤。診斷陣發性叢發性偏頭痛，Lithium只開立一個月?\n\n→醫師回覆用於陣發性叢發性偏頭痛，開立慢籤有不良反應風險\n\n偏頭痛的治療方式可以分為發作的緩解治療及預防性治療。急性治療方面一般常見的止痛藥，如acetaminophen或是非類固醇消炎止痛藥（如ibuprofen、naproxen、diclofenac）患者可以依照一般止痛藥物之劑量來使用。\n\n乙型受體阻斷劑（Beta blockers）此類藥物包含metoprolol、propranolol、timolol等。此類藥物最常見的適應症為高血壓、心衰竭等。對預防偏頭痛有療效。\n\n鈣離子通道阻斷劑（Calcium channel blockers）此類型藥物包含verapamil、flunarizine等。對於預防偏頭痛的證據較少，主要副作用為心搏過緩，使用時可以從低劑量使用起，再依狀況調整。\n\n抗憂鬱劑（Antidepressants）此類藥物對預防偏頭痛較有證據的有amitriptyline及venlafaxine。Amitriptyline最常見的副作用為嗜睡，其他副作用包含口乾、便秘、心搏過速、心悸、尿滯留、姿勢性低血壓等。\n\n抗癲癇藥物（Anticonvulsants）：topiramate、carbamazepine、sodium valproate、lamotrigine、gabapentin和pregabalin等，對預防偏頭痛較有證據的有topiramate及valproate。Topiramate 對於減少偏頭痛的發生頻率效果相當的顯著，甚至可於停藥後維持療效長達六個月。其常見的副作用有嗜睡、頭暈、動作不協調、精神不集中、言語障礙、體重減輕等。\n\nLithium建議作為第二偏頭痛及睡眠頭痛的治療。臨床上治療濃度範圍狹窄 (0.6-1.2 毫莫耳 /升 )。副作用包括無力、噁心顫抖、視力模糊、白血球增加、神智不清、步態不穩、眼震、外椎體路徑症狀、 癲癇等。",

    "原始全文": "<疑義處方集錦> \n\n86歲女性，身高150公分，體重50公斤。診斷病毒性肝炎未伴有肝昏迷，(慢性)血液流失引起之缺鐵性貧血，原發性失眠症，高血壓性心臟及慢性腎臟病伴有心臟衰竭及第五期慢性腎病或末期腎病，心臟衰竭 雙腿自體動脈粥樣硬化，其他分類之肋膜積水，末期腎疾病，結核病之個人史。Pyrisostigmineg適應症?\n\n→醫師回覆用於提升血壓\n\n姿態性低血壓是平躺姿勢改為直立時，血壓明顯下降（定義為收縮壓下降大於 20 或舒張壓下降大於 10 毫米汞柱），症狀包括頭昏、頭疼、視力模糊或暫時性視覺消失、虛弱、嗜睡、甚至昏厥。藥物會引起姿態性低血壓包括：利尿劑會造成過度水分排出而引起低血壓，血管擴張劑造成血管過度擴張而引起相對性的血量降低，甲型阻斷劑引起自主神經反射機轉的不全，精神科用藥都有可能引起姿態性低血壓。血液輸出量不足，如有嚴重的消化性潰瘍出血、痔瘡出血、或嚴重的嘔吐或腹瀉、過度發汗引發嚴重脫水等，都會使體內的血液量不足，引發姿態性低血壓。自主神經系統問題，姿態性低血壓是老年人最常見的有症狀低血壓原因之一。因自主神經系統機能退化，正常調節血壓的機轉無法在短時間內達成，所以容易有姿態性低血壓。其他如：糖尿病產生神經病變、長期飲酒引起神經病變、脊椎神經受損、或病毒感染後引起的神經病變都會造成自主神經機能受損，而造成姿態性低血壓。心臟本身問題，突發性姿勢性低血壓可見於心肌梗塞或心率不整。\n\n非藥物治療：調整生活習慣，包括攝取充足水分、少喝或禁止喝酒、避免待在過熱的環境、睡覺時墊高枕頭、坐著時盡量不要雙腳交叉、起身時放慢速度等等。如果你沒有高血壓，醫師可能會建議你增加鹽分攝取量。若你餐後血糖下降，則醫師可能會建議你採取低醣的少量飲食穿彈性襪、束腹等裝束可能有助於減少血液聚積在腿部，進而改善姿勢性低血壓。\n\n藥物治療：Fludrocortisone，增加血液中的鈉和體液滯留，以提升血壓。Midodrine，抑制血管擴張來提高血壓。Pyridostigmine，可改善感壓反射（血壓反射），提升自律神經調節血壓的能力。。紅血球生成素：增加紅血球質量和血量、 改善血液黏稠度。",

    "原始全文": "女性60歲，體重72.7公斤，診斷泌尿道感染開立自費Vancomycin 1#QID?\n\n→醫師回覆查詢LB04檢驗報告(跨院區至員基)致電醫師，醫師表示因抗生素敏感性上僅對少部分抗生素有效(Vancomycin是有效的)，故開立自費Vancomycin。\n\n腸球菌(Enterococci)是一種移生在腸道的革蘭氏陽性菌，故名腸球菌，其中最常見的菌種為糞腸球菌 (Enterococcus faecalis) 及屎腸球菌(Enterococcus faecium) ，且這兩種為主要致病菌種。腸球菌因有頑強抗藥性的特性，因此臨床治療上非常棘手。腸球菌是與院內感染相關的主要致病菌之一，與泌尿道、軟組織、醫療照護相關感染息息相關，對於目前常用的許多抗生素像是β-lactams、aminoglycosides等具有抗藥性，因此腸球菌成為目前對於全人類健康造成嚴重威脅之一。\n\n因口服 vancomycin 幾乎不會被腸道吸收，在血中與尿中的藥物濃度 極低或幾乎沒有， 所以無法到達泌尿道產生治療效果口服 vancomycin 的臨床用途只限於Clostridioides difficile （CDI）感染，雖然Vancomycin是有效的，但應只限IV劑型，此處方可建議醫師選擇其他類抗生素。(細菌培養數據是否為致病菌需持保留態度)\n\nLinezolid是常被應用於嚴重革蘭氏陽性菌感染取代Vancomycin的第一線用藥，但近年來世界各地越來越多Linezolid對於腸球菌產生抗藥性的報導。有些研究發現長期使用與累積藥量導致Linezolid可能與腸球菌產生抗藥性的風險提高相關。",

const searchFields = ["案例編號","年度","季度","類型","科別","主搜尋藥物","商品名","問題分類","問題內容","案例摘要","關鍵字","原始全文","資料來源"];

function uniq(arr) { return [...new Set(arr.filter(Boolean))].sort(); }
function fillSelect(el, vals) {
  vals.forEach(v => {
    const opt=document.createElement('option');
    opt.value=v; opt.textContent=v;
    el.appendChild(opt);
  });
}
fillSelect(type, uniq(cases.map(x=>x.類型)));
fillSelect(year, uniq(cases.map(x=>x.年度)));
fillSelect(category, uniq(cases.map(x=>x.問題分類)));

function normalize(s){ return String(s||'').toLowerCase().trim(); }
function matchCase(c, keyword) {
  if(!keyword) return true;
  const hay = searchFields.map(f=>c[f]).join(' ').toLowerCase();
  return keyword.split(/\s+/).every(k => hay.includes(k));
}
function escapeRegExp(s){ return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function highlight(text, keyword) {
  let out = esc(String(text || ''));
  const terms = keyword.split(/\s+/).filter(Boolean).slice(0,8);
  for(const t of terms) {
    out = out.replace(new RegExp(escapeRegExp(esc(t)), 'gi'), m => `<mark>${m}</mark>`);
  }
  return out;
}
function esc(text) {
  return String(text ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}
function tagBlock(c, keyword) {
  const tags = String(c.關鍵字 || '').split('、').map(x => x.trim()).filter(Boolean);
  if(!tags.length) return '';
  return `<div class="section">
    <div class="section-title">關鍵字</div>
    <div class="section-body"><div class="tags">${tags.map(t => `<span class="tag">${highlight(t, keyword)}</span>`).join('')}</div></div>
  </div>`;
}
function rxTable(rows, mode) {
  if(!rows || !rows.length) return '';
  return `<div class="table-scroll"><table>
    <thead><tr><th>藥名</th><th>劑量</th><th>頻次</th><th>天數</th><th>總量</th></tr></thead>
    <tbody>
      ${rows.map(r => `<tr class="${r.異動 ? (mode==='before' ? 'changed-before' : 'changed-after') : ''}">
        <td>${esc(r.藥名)}</td>
        <td>${esc(r.劑量)}</td>
        <td>${esc(r.頻次)}</td>
        <td>${esc(r.天數)}</td>
        <td>${esc(r.總量)}</td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}
function diffBlock(c) {
  if(!c.異動重點 || !c.異動重點.length) return '';
  return `<div class="section">
    <div class="section-title">異動重點</div>
    <div class="section-body">
      <div class="diff">
        ${c.異動重點.map(x => `<div class="diff-item">
          <div class="diff-before">修正前：${esc(x.修正前)}</div>
          <div class="diff-arrow">↓</div>
          <div class="diff-after">修正後：${esc(x.修正後)}</div>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}
function rxBlock(c) {
  if(c.類型 !== '錯誤醫囑') return '';
  const hasBefore = c.修正前處方 && c.修正前處方.length;
  const hasAfter = c.修正後處方 && c.修正後處方.length;
  if(!hasBefore && !hasAfter) return '';
  return `${diffBlock(c)}
  <div class="section">
    <div class="section-title">處方異動比較</div>
    <div class="section-body">
      <div class="rx-note">${esc(c.處方表格備註 || '')}</div>
      <div class="rx-wrap">
        <div class="rx-box">
          <div class="rx-title before">修正前處方</div>
          ${rxTable(c.修正前處方, 'before')}
        </div>
        <div class="rx-box">
          <div class="rx-title after">修正後處方</div>
          ${rxTable(c.修正後處方, 'after')}
        </div>
      </div>
    </div>
  </div>`;
}
function render() {
  const keyword = normalize(q.value);
  let filtered = cases.filter(c =>
    matchCase(c, keyword) &&
    (!type.value || c.類型 === type.value) &&
    (!year.value || c.年度 === year.value) &&
    (!category.value || c.問題分類 === category.value)
  );
  count.textContent = `找到 ${filtered.length} / ${cases.length} 筆`;
  const err = filtered.filter(c=>c.類型==="錯誤醫囑").length;
  const qup = filtered.filter(c=>c.類型==="疑義處方").length;
  const cats = uniq(filtered.map(c=>c.問題分類)).length;
  stats.innerHTML = `
    <div class="stat"><b>${filtered.length}</b>搜尋結果</div>
    <div class="stat"><b>${err}</b>錯誤醫囑</div>
    <div class="stat"><b>${qup}</b>疑義處方</div>
    <div class="stat"><b>${cats}</b>問題分類</div>`;

  if(!filtered.length) {
    results.innerHTML = '<div class="empty">查無資料。可以換藥名、商品名或關鍵字試試，資料庫還小，不要太兇。</div>';
    return;
  }
  results.innerHTML = filtered.map(c => `
    <article class="card">
      <div class="meta">
        <span class="badge">${esc(c.案例編號)}</span>
        <span class="badge ${c.類型==='錯誤醫囑'?'err':'q'}">${esc(c.類型)}</span>
        <span class="badge">${esc(c.問題分類)}</span>
      </div>
      <h3>${highlight(c.主搜尋藥物, keyword)} <span style="color:#667085;font-weight:500">(${highlight(c.商品名, keyword)})</span></h3>
      <div class="row"><span class="label">科別</span>${esc(c.科別)}　<span class="label">年度季別</span>${esc(c.年度)}${esc(c.季度)}</div>
      <div class="summary">${highlight(c.案例摘要, keyword)}</div>
      <div class="card-actions"><button class="openbtn" onclick="openCase('${esc(c.案例編號)}')">查看案例</button></div>
    </article>
  `).join('');
}
function openCase(caseId) {
  const c = cases.find(x => x.案例編號 === caseId);
  if(!c) return;
  const keyword = normalize(q.value);
  modalTitle.innerHTML = `
    <div class="meta">
      <span class="badge">${esc(c.案例編號)}</span>
      <span class="badge ${c.類型==='錯誤醫囑'?'err':'q'}">${esc(c.類型)}</span>
      <span class="badge">${esc(c.問題分類)}</span>
    </div>
    <h2 id="modalHeading">${highlight(c.主搜尋藥物, keyword)} <span class="drug">(${highlight(c.商品名, keyword)})</span></h2>
    <div class="row"><span class="label">科別</span>${esc(c.科別)}　<span class="label">年度季別</span>${esc(c.年度)}${esc(c.季度)}</div>
  `;
  modalBody.innerHTML = `
    <div class="section">
      <div class="section-title">案例摘要</div>
      <div class="section-body">${highlight(c.案例摘要, keyword)}</div>
    </div>
    <div class="section">
      <div class="section-title">問題內容</div>
      <div class="section-body">${highlight(c.問題內容, keyword)}</div>
    </div>
    ${rxBlock(c)}
    <div class="section">
      <div class="section-title">原始全文</div>
      <div class="section-body"><div class="prebox">${highlight(c.原始全文, keyword)}</div></div>
    </div>
    ${tagBlock(c, keyword)}
    <div class="section">
      <div class="section-title">資料來源</div>
      <div class="section-body">${esc(c.資料來源)}</div>
    </div>
  `;
  modalBackdrop.classList.add('show');
  document.body.classList.add('modal-open');
}
function closeModal() {
  modalBackdrop.classList.remove('show');
  document.body.classList.remove('modal-open');
}
function backdropClose(e) {
  if(e.target === modalBackdrop) closeModal();
}
document.addEventListener('keydown', e => {
  if(e.key === 'Escape') closeModal();
});
function resetFilters() { q.value=''; type.value=''; year.value=''; category.value=''; render(); }
function downloadJSON() {
  const blob = new Blob([JSON.stringify(cases, null, 2)], {type:"application/json;charset=utf-8"});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = "疑義處方知識庫_v1.0資料.json";
  a.click();
  URL.revokeObjectURL(a.href);
}
function toCSV(data) {
  const fields = ["案例編號","年度","季度","類型","科別","主搜尋藥物","商品名","問題分類","問題內容","案例摘要","關鍵字","原始全文","資料來源","處方表格備註","異動重點","修正前處方","修正後處方"];
  const rows = [fields.join(',')];
  for (const c of data) rows.push(fields.map(f => `"${String(typeof c[f] === 'object' ? JSON.stringify(c[f]) : (c[f]??'')).replaceAll('"','""')}"`).join(','));
  return rows.join('\n');
}
async function copyCSV() {
  await navigator.clipboard.writeText(toCSV(cases));
  alert('已複製 CSV，可直接貼到 Excel。');
}
[q,type,year,category].forEach(el => el.addEventListener('input', render));
render();
